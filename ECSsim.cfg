SPECIFICATION Spec

CONSTANTS
    ShortTickets = 14
    LongTickets = 4
    ShortWaitLimit = 14
    LongWaitLimit = 4
    
    \* Simulation Control
    MaxSteps = 2000
    CSVFile  = "ecs_unbounded_run.csv"
    IOPercentage = 5
    SampleInterval = 10
    
    \* 30% chance to attempt a spawn per step
    \* Increase this to trigger overload
    ArrivalRate = 90 

\* INVARIANTS checks properties that must be true in EVERY reachable state
INVARIANTS
    TypeOK


\* PROPERTIES checks temporal logic (Liveness) - e.g., "Good things eventually happen"
PROPERTIES
\* Disable deadlock checking
CHECK_DEADLOCK FALSE

CONSTRAINT
    AtTermination