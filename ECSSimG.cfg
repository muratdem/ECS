SPECIFICATION Spec

CONSTANTS
    ShortTickets = 14
    LongTickets = 2
    ShortWaitLimit = 14
    LongWaitLimit = 2
    
    \* Simulation Control
    MaxSteps = 20000
    CSVFile  = "ecs_sim_run.csv"
    IOPercentage = 20
    SampleInterval = 10
    
    \* 30% chance to attempt a spawn per step
    \* Increase this to trigger overload
    ArrivalRate = 90 

\* INVARIANTS checks properties that must be true in EVERY reachable state
INVARIANTS
    TypeOK


\* PROPERTIES checks temporal logic (Liveness) - e.g., "Good things eventually happen"
PROPERTIES
\* Disable deadlock checking
CHECK_DEADLOCK FALSE

CONSTRAINT
    AtTermination