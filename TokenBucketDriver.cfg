SPECIFICATION Spec

CONSTANTS 
    \* Model a small system to keep state space manageable
    Requests = {"R1", "R2", "R3"}
    
    \* Retry limits
    MaxRetries = 2
    
    \* Token Bucket parameters (1 token for success, 10 to retry)
    BucketCapacity = 10
    SuccessReward = 1
    RetryCost = 10

INVARIANTS
    MaxRetriesRespected

PROPERTIES
    NoStarvation

CHECK_DEADLOCK 
    FALSE    