\* SPECIFICATION defines the temporal formula describing the system behavior
SPECIFICATION Spec

\* CONSTANTS defines the parameters of the model
CONSTANTS
    Requests = {r1, r2, r3, r4, r5, r6, r7}
    ShortTickets = 5
    LongTickets = 1

\* INVARIANTS checks properties that must be true in EVERY reachable state
INVARIANTS
    TypeOK


\* PROPERTIES checks temporal logic (Liveness) - e.g., "Good things eventually happen"
PROPERTIES
    \* You can add specific liveness properties here if desired.

\* Disable deadlock checking
CHECK_DEADLOCK FALSE